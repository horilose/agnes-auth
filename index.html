<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Agnes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body {
            background-color: #1C1C1C;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            box-sizing: border-box;
        }

        /* --- ЛЕВАЯ ЧАСТЬ --- */
        .visual-panel {
            width: 660px; 
            height: calc(100vh - 40px); 
            min-height: 500px;
            background-color: rgba(82, 81, 73, 0.5);
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.8;
            animation-iteration-count: infinite; animation-direction: alternate; animation-timing-function: ease-in-out;
        }
        .orb-1 { width: 180px; height: 180px; background: #DCDBCE; top: 15%; left: 10%; animation-name: floatOrb1; animation-duration: 8s; }
        .orb-2 { width: 220px; height: 220px; background: #525149; bottom: 15%; left: 20%; animation-name: floatOrb2; animation-duration: 11s; }
        .orb-3 { width: 160px; height: 160px; background: #8F8E83; top: 40%; right: 15%; animation-name: floatOrb3; animation-duration: 9s; }

        @keyframes floatOrb1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 30px) scale(1.1); } }
        @keyframes floatOrb2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, -40px) scale(1.05); } }
        @keyframes floatOrb3 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-30px, 40px) scale(1.15); } }

        /* --- ПРАВАЯ ЧАСТЬ --- */
        .content-wrapper {
            flex-grow: 1; 
            display: flex; justify-content: center; align-items: center;
        }

        .content-panel {
            display: flex;
            flex-direction: column;
            width: 360px; 
            height: calc(100vh - 40px); 
            min-height: 500px;
            position: relative; /* Важно для всплывающих плашек */
        }

        /* --- СТРУКТУРА ШАГОВ --- */
        .step-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        #main-step { display: flex; } 

        .center-block {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bottom-block {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 2px;
        }

        h1 { margin: 0 0 8px 0; font-size: 28px; font-weight: 800; text-align: center; } 
        p.subtitle { color: #aaaaaa; margin: 0 0 35px 0; font-size: 17px; font-weight: 500; text-align: center; } 

        /* --- КНОПКИ ПРОВАЙДЕРОВ --- */
        .btn {
            position: relative; display: block; width: 280px; height: 64px; 
            background-color: #525149; border-radius: 32px; margin: 0 auto 14px auto;
            border: none; cursor: pointer; transition: background-color 0.3s, transform 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-sizing: border-box;
        }
        .btn:hover { background-color: #616056; }
        .btn:active { transform: scale(1.03); } 

        .btn-icon-wrapper {
            position: absolute; top: 8px; left: 8px; width: 48px; height: 48px;
            background-color: #7B7A71; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            z-index: 2; transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-icon-wrapper svg { width: 24px; height: 24px; fill: white; }
        .btn:hover .btn-icon-wrapper { left: 224px; }

        .text-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; }
        .btn-text-ghost { position: absolute; color: rgba(255, 255, 255, 0.5); font-size: 15px; font-weight: 700; transform: translateX(24px); opacity: 1; transition: opacity 0.3s ease-in 0.4s; }
        .btn-text-solid { position: absolute; color: white; font-size: 15px; font-weight: 700; transform: translateX(-24px); opacity: 0; transition: opacity 0.2s ease-out 0s; }
        .btn:hover .btn-text-ghost { opacity: 0; transition: opacity 0.2s ease-out 0s; }
        .btn:hover .btn-text-solid { opacity: 1; transition: opacity 0.3s ease-in 0.4s; }

        /* --- ПОЛЯ ВВОДА И ПРОСТЫЕ КНОПКИ --- */
        .input-field { 
            width: 280px; height: 60px; padding: 0 20px; margin: 0 auto 12px auto; 
            border-radius: 30px; border: 2px solid #333; background-color: #151515; 
            color: white; font-size: 16px; box-sizing: border-box; text-align: center; 
            transition: border-color 0.3s; 
        }
        .input-field:focus { outline: none; border-color: #7B7A71; }
        
        .btn-simple { 
            width: 280px; height: 60px; border-radius: 30px; border: none; 
            background: #DCDBCE; color: #151515; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: transform 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28), background-color 0.2s; 
        }
        .btn-simple:active { transform: scale(1.03); } 

        .btn-dark { background-color: #525149; color: white; }
        .btn-dark:hover { background-color: #616056; }
        
        .btn-text-only { 
            background: transparent; color: #888; border: none; width: 280px; 
            font-size: 14px; margin: 6px auto; cursor: pointer; transition: color 0.2s; 
            padding: 0;
        }
        .btn-text-only:hover:not(:disabled) { color: white; }
        .btn-text-only:disabled { cursor: default; opacity: 0.5; }
        .btn-text-only:last-child { margin-bottom: 0; }

        /* --- ВСПЛЫВАЮЩАЯ ПЛАШКА (БЕЗ ПРЫЖКОВ ИНТЕРФЕЙСА) --- */
        .toast-badge {
            position: absolute;
            bottom: 80px; /* Висит прямо над нижними кнопками */
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: #7B7A71;
            color: white;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 14px;
            text-align: center;
            width: 280px;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            z-index: 100;
            pointer-events: none; /* Чтобы плашка не мешала кликать */
            line-height: 1.4;
        }
        
        /* Класс, который делает плашку видимой */
        .toast-badge.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* --- ЯЧЕЙКИ ДЛЯ КОДА (OTP) --- */
        .otp-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .otp-box {
            width: 42px; height: 56px; border-radius: 14px; border: 2px solid #333;
            background-color: #151515; color: white; font-size: 24px; font-weight: 700;
            text-align: center; transition: border-color 0.3s, transform 0.1s;
        }
        .otp-box:focus { outline: none; border-color: #7B7A71; transform: translateY(-2px); }

        @media (max-width: 900px) { 
            body { flex-direction: column; height: auto; } 
            .visual-panel { width: 100%; height: 250px; min-height: 250px; margin-bottom: 20px; }
            .content-panel { height: auto; min-height: 400px; }
            .content-wrapper { flex-grow: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="visual-panel">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="content-wrapper">
        <div class="content-panel">
            
            <!-- Универсальная плашка для всех ошибок и уведомлений -->
            <div id="toast-notification" class="toast-badge"></div>

            <!-- ШАГ 1: ВЫБОР ПРОВАЙДЕРА -->
            <div id="main-step" class="step-container">
                <div class="center-block">
                    <h1 id="main-title">Без авторизации никуда</h1>
                    <p class="subtitle" id="status-text">Как тебе удобнее войти?</p>
                    
                    <button class="btn" onclick="showEmailStep()">
                        <div class="btn-icon-wrapper">
                            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        </div>
                        <div class="text-wrapper">
                            <span class="btn-text-ghost">Почта</span>
                            <span class="btn-text-solid">Почта</span>
                        </div>
                    </button>

                    <button class="btn" onclick="loginOAuth(event, 'discord')">
                        <div class="btn-icon-wrapper">
                            <svg viewBox="0 0 24 24"><path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.33-.35-.76-.53-1.09a.09.09 0 0 0-.07-.03c-1.5.26-2.94.71-4.27 1.33-.01 0-.02.01-.03.02-2.72 4.07-3.47 8.03-3.1 11.95 0 .02.01.04.03.05 1.8 1.32 3.53 2.12 5.24 2.65.03.01.06-.01.07-.04.41-.56.77-1.14 1.1-1.74a.07.07 0 0 0-.04-.1c-.57-.22-1.13-.48-1.65-.78a.08.08 0 0 1-.01-.13c.12-.09.23-.19.35-.29a.07.07 0 0 1 .08-.01c3.54 1.61 7.37 1.61 10.9 0a.07.07 0 0 1 .08.01c.12.1.23.19.35.29a.08.08 0 0 1-.01.13c-.53.3-1.09.56-1.66.78a.07.07 0 0 0-.04.1c.33.6.69 1.18 1.1 1.74.01.03.04.05.07.04 1.71-.53 3.44-1.33 5.24-2.65.02-.01.03-.03.03-.05.41-4.3-.56-8.28-3.12-11.97a.08.08 0 0 0-.03-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12 0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12 0 1.17-.83 2.12-1.89 2.12z"/></svg>
                        </div>
                        <div class="text-wrapper">
                            <span class="btn-text-ghost">Discord</span>
                            <span class="btn-text-solid">Discord</span>
                        </div>
                    </button>

                    <button class="btn" onclick="loginOAuth(event, 'github')">
                        <div class="btn-icon-wrapper">
                            <svg viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.15-1.11-1.46-1.11-1.46-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
                        </div>
                        <div class="text-wrapper">
                            <span class="btn-text-ghost">GitHub</span>
                            <span class="btn-text-solid">GitHub</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- ШАГ 2: ВВОД ПОЧТЫ -->
            <div id="email-step" class="step-container">
                <div class="center-block">
                    <input type="email" id="email-input" class="input-field" placeholder="Электронная почта">
                    <button class="btn-simple btn-dark" id="send-code-btn" onclick="sendCode()">Получить код</button>
                </div>
                <!-- Кнопки прибиты к низу -->
                <div class="bottom-block">
                    <button class="btn-text-only" onclick="showMainStep()">Вернуться назад</button>
                </div>
            </div>

            <!-- ШАГ 3: ВВОД КОДА -->
            <div id="otp-step" class="step-container">
                <div class="center-block">
                    <h1 style="margin-bottom: 25px;">Введи код</h1>
                    <div class="otp-container" id="otp-container">
                        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
                    </div>
                </div>
                <!-- Кнопки прибиты к низу -->
                <div class="bottom-block">
                    <button class="btn-text-only" onclick="showEmailStep()">Изменить почту</button>
                    <button class="btn-text-only" id="resend-code-btn" onclick="resendCode()">Отправить код повторно (01:00)</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const supabaseUrl = 'https://cpvzerdqdnwyiiykcsjg.supabase.co';
        const supabaseKey = 'sb_publishable_PG3sCVKzOERXpjy3ygFmUg_VwfeKIKU';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUserEmail = '';
        let timerInterval;

        // --- ЛОГИКА ПЛАШКИ (Toast Notification) ---
        function showNotification(msg) {
            const toast = document.getElementById('toast-notification');
            toast.innerText = msg;
            toast.classList.add('show');
        }

        function hideNotification() {
            document.getElementById('toast-notification').classList.remove('show');
        }

        // Логика переключения экранов
        function showMainStep() {
            hideNotification();
            document.getElementById('main-step').style.display = 'flex';
            document.getElementById('email-step').style.display = 'none';
            document.getElementById('otp-step').style.display = 'none';
        }

        function showEmailStep() {
            hideNotification();
            clearInterval(timerInterval); 
            document.getElementById('main-step').style.display = 'none';
            document.getElementById('email-step').style.display = 'flex';
            document.getElementById('otp-step').style.display = 'none';
            setTimeout(() => document.getElementById('email-input').focus(), 50);
        }

        function showOtpStep() {
            hideNotification();
            document.getElementById('main-step').style.display = 'none';
            document.getElementById('email-step').style.display = 'none';
            document.getElementById('otp-step').style.display = 'flex';
            
            // Очищаем ячейки
            const otpBoxes = document.querySelectorAll('.otp-box');
            otpBoxes.forEach(box => { box.value = ''; box.disabled = false; });
            setTimeout(() => otpBoxes[0].focus(), 50);
            
            startResendTimer();
        }

        // Убираем ошибку, как только человек начинает печатать почту
        document.getElementById('email-input').addEventListener('input', hideNotification);

        document.getElementById('email-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendCode();
            }
        });

        // --- ЛОГИКА 6 ЯЧЕЕК (OTP) ---
        const otpBoxes = document.querySelectorAll('.otp-box');
        otpBoxes.forEach((box, index) => {
            box.addEventListener('input', (e) => {
                hideNotification(); // Прячем ошибку, как только начали вводить новый код
                
                if (box.value.length > 1) box.value = box.value.slice(-1);
                if (box.value !== '' && index < 5) otpBoxes[index + 1].focus();
                checkAutoSubmit();
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value === '' && index > 0) otpBoxes[index - 1].focus();
            });
        });

        // Вставка (Ctrl+V)
        document.getElementById('otp-container').addEventListener('paste', (e) => {
            e.preventDefault();
            hideNotification();
            const digits = e.clipboardData.getData('text').trim().match(/\d/g);
            if (digits && digits.length >= 6) {
                otpBoxes.forEach((box, i) => { box.value = digits[i]; });
                checkAutoSubmit();
            }
        });

        function checkAutoSubmit() {
            const code = Array.from(otpBoxes).map(b => b.value).join('');
            if (code.length === 6) verifyCode(code);
        }

        // --- ТАЙМЕР ---
        function startResendTimer() {
            const resendBtn = document.getElementById('resend-code-btn');
            let timeLeft = 60;
            resendBtn.disabled = true;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                resendBtn.innerText = `Отправить код повторно (${m}:${s})`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    resendBtn.innerText = 'Отправить код повторно';
                }
            }, 1000);
        }

        // --- ВЗАИМОДЕЙСТВИЕ С SUPABASE ---
        async function sendCode(isResend = false) {
            hideNotification();
            const email = document.getElementById('email-input').value.trim();
            
            if (!email) return showNotification('Введи почту.');

            const btn = isResend ? document.getElementById('resend-code-btn') : document.getElementById('send-code-btn');
            btn.innerText = 'Отправка...';
            btn.disabled = true;

            try {
                const { error } = await supabaseClient.auth.signInWithOtp({ email: email });
                if (error) throw error;
                currentUserEmail = email;
                
                if (!isResend) showOtpStep();
                else startResendTimer();

            } catch (err) {
                // Если сработал антиспам Supabase
                if (err.message && (err.message.toLowerCase().includes('security') || err.message.toLowerCase().includes('seconds'))) {
                    showNotification('Ты слишком быстр, мы не успеваем. Попробуй еще раз через минуту');
                } else {
                    showNotification('Ошибка: ' + err.message);
                }

                if (!isResend) {
                    btn.innerText = 'Получить код';
                    btn.disabled = false;
                } else {
                    btn.innerText = 'Отправить код повторно';
                    btn.disabled = false;
                }
            }
        }

        function resendCode() {
            sendCode(true); 
        }

        async function verifyCode(code) {
            hideNotification();
            otpBoxes.forEach(box => box.disabled = true);

            try {
                const { data, error } = await supabaseClient.auth.verifyOtp({
                    email: currentUserEmail,
                    token: code,
                    type: 'email'
                });

                if (error) throw error;

                if (data.session) {
                    const redirectUrl = `agnes://auth#access_token=${data.session.access_token}&refresh_token=${data.session.refresh_token}&expires_in=${data.session.expires_in}&token_type=${data.session.token_type}`;
                    
                    document.getElementById('otp-step').innerHTML = '<div class="center-block"><h1>Успешно!</h1><p class="subtitle">Открываем Agnes...</p></div>';
                    window.location.href = redirectUrl;
                }
            } catch (err) {
                // Показываем плашку с ошибкой
                showNotification('Код не правильный. Посмотри ещё раз');
                
                // Очищаем ячейки при ошибке
                otpBoxes.forEach(box => { box.disabled = false; box.value = ''; });
                otpBoxes[0].focus();
            }
        }

        async function loginOAuth(event, providerName) {
            const currentBtn = event.currentTarget;
            const ghostText = currentBtn.querySelector('.btn-text-ghost');
            const solidText = currentBtn.querySelector('.btn-text-solid');
            const originalText = ghostText.innerText;
            
            ghostText.innerText = "Подключение...";
            solidText.innerText = "Подключение...";
            
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: providerName,
                    options: { redirectTo: 'agnes://auth' }
                });
                if (error) throw error;
            } catch (err) {
                showNotification('Ошибка: ' + err.message); 
                ghostText.innerText = originalText;
                solidText.innerText = originalText;
            }
        }
    </script>
</body>
</html>
