<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Agnes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body {
            background-color: #151515;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1c1c1c;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333333;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
        }
        h1 { margin-top: 0; font-size: 24px; }
        p { color: #aaaaaa; margin-bottom: 30px; font-size: 13px; line-height: 1.5; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-github { background-color: #24292F; border: 1px solid #444; }
        .btn-github:hover { background-color: #1F2428; }
        .btn-discord { background-color: #5865F2; }
        .btn-discord:hover { background-color: #4752C4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Вход в Agnes</h1>
        <p>После авторизации вы автоматически вернетесь в приложение.</p>
        
        <button class="btn btn-github" onclick="login(event, 'github')">Войти через GitHub</button>
        <button class="btn btn-discord" onclick="login(event, 'discord')">Войти через Discord</button>
    </div>

    <script>
        const supabaseUrl = 'https://cpvzerdqdnwyiiykcsjg.supabase.co';
        const supabaseKey = 'sb_publishable_PG3sCVKzOERXpjy3ygFmUg_VwfeKIKU';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function login(event, providerName) {
            // Меняем текст кнопки для визуального отклика
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Подключение...";
            
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: providerName,
                    options: {
                        redirectTo: 'agnes://auth'
                    }
                });
                
                if (error) {
                    alert('Ошибка Supabase: ' + error.message);
                    btn.innerText = originalText;
                }
            } catch (err) {
                alert('Системная ошибка: ' + err.message);
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
